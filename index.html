<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katsy - Project Page</title>
    <style>
        /* 背景は白 */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        /* Katsy：青い大きい文字 */
        h1 {
            color: #007bff; /* 鮮やかな青 */
            font-size: 5rem; /* かなり大きめ */
            margin: 0 0 2rem 0;
            letter-spacing: 2px;
        }

        /* 文字リンク：Minecraft配布 */
        .link-text {
            font-size: 1.5rem;
            color: #0056b3;
            text-decoration: none;
            padding-bottom: 5px;
            border-bottom: 2px solid #0056b3;
            transition: opacity 0.3s;
        }

        .link-text:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- 一番上の大きな名前 -->
    <h1>Katsy</h1>

    <!-- Google Driveへの文字リンク -->
    <a href="https://drive.google.com/drive/folders/1leNOBHwlciL15Sq85ou8nuBf5f1ik_6Q?usp=sharing" class="link-text">
        Minecraft配布
    </a>

</body>
</html>
